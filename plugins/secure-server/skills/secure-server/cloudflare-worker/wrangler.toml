name = "server-security-alerts"
main = "worker.js"
compatibility_date = "2025-12-01"

# KV namespace for storing alerts and heartbeats
[[kv_namespaces]]
binding = "ALERTS_KV"
id = "YOUR_KV_NAMESPACE_ID"

# Cron trigger for dead man's switch (every 5 minutes)
[triggers]
crons = ["*/5 * * * *"]

# Environment variables (set secrets via wrangler secret put)
[vars]
NTFY_TOPIC = "server-alerts"
ALERT_RETENTION_DAYS = "30"
HEARTBEAT_TIMEOUT_MINUTES = "15"

# To deploy:
# 1. Create KV namespace: wrangler kv:namespace create ALERTS_KV
# 2. Update the id above with the returned namespace ID
# 3. Set the secret: wrangler secret put ALERT_SECRET
# 4. Set ntfy topic if different: wrangler secret put NTFY_TOPIC
# 5. Deploy: wrangler deploy
